## Historical reference stack retained for legacy Monad/Ethereum production-style workflows.
## Sovereign Monad production/runtime variant.
version: '3.8'

services:
  # Production Kafka Cluster (3 brokers)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G

  # All services with production settings
  monad-market-agent:
    build:
      context: ./monad-market-agent
      dockerfile: Dockerfile
    environment:
      - MONAD_WS_URL=${MONAD_WS_URL}
      - KURU_ETH_USDC_ADDR=${KURU_ETH_USDC_ADDR}
      - KURU_MON_USDC_ADDR=${KURU_MON_USDC_ADDR}
      - KAFKA_BROKERS=kafka-1:29092
      - KAFKA_TOPIC=market.monad.price-snapshot
      - LOG_LEVEL=info
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  eth-market-agent:
    build:
      context: ./eth-market-agent
      dockerfile: Dockerfile
    environment:
      - ETH_WS_URL=${ETH_WS_URL}
      - KAFKA_BROKERS=kafka-1:29092
      - KAFKA_TOPIC=market.eth.price-snapshot
      - LOG_LEVEL=info
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  spread-scanner:
    build:
      context: ./spread-scanner
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - INPUT_TOPIC_MONAD=market.monad.price-snapshot
      - INPUT_TOPIC_ETH=market.eth.price-snapshot
      - OUTPUT_TOPIC=market.spread.signal
      - MIN_SPREAD_BPS=10
      - MIN_CAPACITY_USD=10000
      - LOG_LEVEL=info
    restart: always

  opportunity-constructor:
    build:
      context: ./opportunity-constructor
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - INPUT_TOPIC=market.spread.signal
      - OUTPUT_TOPIC=risk.opportunity-candidate
      - DEFAULT_SIZE_PERCENT=5
      - MIN_SIZE_USD=1000
      - LOG_LEVEL=info
    restart: always

  risk-engine:
    build:
      context: ./risk-engine
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - INPUT_TOPIC=risk.opportunity-candidate
      - OUTPUT_TOPIC=risk.opportunity-evaluation
      - SIMULATIONS=10000
      - EV_MIN_THRESHOLD=100
      - SHARPE_LIKE_THRESHOLD=0.5
      - MAX_TAIL_LOSS_PERCENT=20
      - LOG_LEVEL=info
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G

  portfolio-manager:
    build:
      context: ./portfolio-manager
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - INPUT_TOPIC=risk.opportunity-evaluation
      - OUTPUT_TOPIC=execution.execution-plan
      - MAX_BRIDGE_EXPOSURE_PERCENT=30
      - MAX_CHAIN_EXPOSURE_PERCENT=50
      - MAX_SINGLE_TRADE_PERCENT=10
      - LOG_LEVEL=info
    restart: always

  # Live execution - controlled ramp
  monad-arb-bot:
    build:
      context: ./monad-arb-bot
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - INPUT_TOPIC=execution.execution-plan
      - OUTPUT_TOPIC=execution.execution-result
      - MONAD_RPC_URL=${MONAD_RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - DRY_RUN=false
      - MAX_POSITION_USD=${MAX_POSITION_USD}
      - MAX_SLIPPAGE_BPS=50
      - LOG_LEVEL=info
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  eth-arb-bot:
    build:
      context: ./eth-arb-bot
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - INPUT_TOPIC=execution.eth-execution-plan
      - OUTPUT_TOPIC=execution.eth-result
      - ETH_RPC_URL=${ETH_RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - DRY_RUN=false
      - LOG_LEVEL=info
    restart: always

  bridge-exec-bot:
    build:
      context: ./bridge-exec-bot
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - ETH_RPC_URL=${ETH_RPC_URL}
      - MONAD_RPC_URL=${MONAD_RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - BRIDGE_TYPE=wormhole-ntt
      - DRY_RUN=false
      - LOG_LEVEL=info
    restart: always

  model-feedback-logger:
    build:
      context: ./model-feedback-logger
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - OUTPUT_DIR=/app/logs
      - LOG_LEVEL=info
    volumes:
      - feedback-logs:/app/logs
    restart: always

  stress-monitor:
    build:
      context: ./stress-monitor
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - MONAD_WS_URL=${MONAD_WS_URL}
      - LOG_LEVEL=info
    restart: always

  # Production monitoring
  dashboard:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - KAFKA_BROKERS=kafka-1:29092
      - LOGS_DIR=/app/logs
    volumes:
      - feedback-logs:/app/logs
    depends_on:
      - kafka-1
    restart: always

  # Alerting
  alert-manager:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    environment:
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK}
      - LOG_LEVEL=info
    restart: always

volumes:
  zookeeper-data:
  kafka-1-data:
  feedback-logs:

networks:
  default:
    name: monad-mev-prod

