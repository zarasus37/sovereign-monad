services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: monad-mev-mainnet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    restart: on-failure
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: monad-mev-mainnet-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: on-failure
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: monad-mev-mainnet-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: monad-mev-mainnet
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  monad-market-agent:
    build:
      context: ./monad-market-agent
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-monad-agent
    depends_on:
      - kafka
    environment:
      - MONAD_WS_URL=${MONAD_WS_URL}
      - MONAD_RPC_URL=${MONAD_RPC_URL}
      - KURU_ETH_USDC_ADDR=${KURU_ETH_USDC_ADDR}
      - KURU_WETH_MON_ADDR=${KURU_WETH_MON_ADDR}
      - KURU_WETH_AUSD_ADDR=${KURU_WETH_AUSD_ADDR}
      - KURU_MON_USDC_ADDR=${KURU_MON_USDC_ADDR}
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC=market.monad.price-snapshot
      - LOG_LEVEL=info
    restart: on-failure

  eth-market-agent:
    build:
      context: ./eth-market-agent
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-eth-agent
    depends_on:
      - kafka
    environment:
      - ETH_WS_URL=${ETH_WS_URL}
      - ETH_RPC_URL=${ETH_RPC_URL}
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC=market.eth.price-snapshot
      - LOG_LEVEL=info
    restart: on-failure

  spread-scanner:
    build:
      context: ./spread-scanner
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-spread-scanner
    depends_on:
      - monad-market-agent
      - eth-market-agent
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC_MONAD=market.monad.price-snapshot
      - INPUT_TOPIC_ETH=market.eth.price-snapshot
      - OUTPUT_TOPIC=market.spread.signal
      - MIN_SPREAD_BPS=${MIN_SPREAD_BPS:-15}
      - MIN_LIQUIDITY_10BPS_USD=${MIN_LIQUIDITY_10BPS_USD:-1000}
      - MIN_CAPACITY_USD=${MIN_CAPACITY_USD:-5000}
      - LOG_LEVEL=info
    restart: on-failure

  opportunity-constructor:
    build:
      context: ./opportunity-constructor
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-opp-constructor
    depends_on:
      - spread-scanner
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=market.spread.signal
      - OUTPUT_TOPIC=risk.opportunity-candidate
      - DEFAULT_SIZE_PERCENT=10
      - MIN_SIZE_USD=10
      - LOG_LEVEL=info
    restart: on-failure

  risk-engine:
    build:
      context: ./risk-engine
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-risk-engine
    depends_on:
      - opportunity-constructor
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=risk.opportunity-candidate
      - OUTPUT_TOPIC=risk.opportunity-evaluation
      - SIMULATIONS=1000
      - EV_MIN_THRESHOLD=${EV_MIN_THRESHOLD:-10}
      - SHARPE_LIKE_THRESHOLD=0.3
      - MAX_TAIL_LOSS_PERCENT=30
      - LOG_LEVEL=info
    restart: on-failure

  portfolio-manager:
    build:
      context: ./portfolio-manager
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-portfolio
    depends_on:
      - risk-engine
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=risk.opportunity-evaluation
      - OUTPUT_TOPIC=execution.execution-plan
      - MAX_BRIDGE_EXPOSURE_PERCENT=25
      - MAX_CHAIN_EXPOSURE_PERCENT=80
      - MAX_SINGLE_TRADE_PERCENT=0.1
      - LOG_LEVEL=info
    restart: on-failure

  monad-arb-bot:
    build:
      context: ./monad-arb-bot
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-arb-bot
    depends_on:
      - portfolio-manager
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=execution.execution-plan
      - OUTPUT_TOPIC=execution.execution-result
      - MONAD_RPC_URL=${MONAD_RPC_URL}
      - PRIVATE_KEY=${WALLET_PRIVATE_KEY}
      - DRY_RUN=true
      - MAX_POSITION_USD=100
      - MAX_SLIPPAGE_BPS=100
      - LOG_LEVEL=info
    restart: on-failure

  model-feedback-logger:
    build:
      context: ./model-feedback-logger
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-feedback
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPICS=market.monad.price-snapshot,market.eth.price-snapshot,market.spread.signal,risk.opportunity-candidate,risk.opportunity-evaluation,execution.execution-result
      - OUTPUT_DIR=/app/logs
      - LOG_LEVEL=info
    volumes:
      - feedback-logs:/app/logs
    restart: on-failure

  stress-monitor:
    build:
      context: ./stress-monitor
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-stress
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:29092
      - OUTPUT_TOPIC=market.stress-signal
      - MONAD_WS_URL=${MONAD_WS_URL}
      - LOG_LEVEL=info
    restart: on-failure

  dashboard:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: monad-mev-mainnet-dashboard
    ports:
      - "8501:8501"
    environment:
      - KAFKA_BROKERS=kafka:29092
      - LOGS_DIR=/app/logs
    volumes:
      - feedback-logs:/app/logs
    depends_on:
      - kafka
      - model-feedback-logger
    restart: on-failure

volumes:
  zookeeper-data:
  feedback-logs:

networks:
  default:
    name: monad-mev-mainnet
