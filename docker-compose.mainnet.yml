services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: base-arb-mev-mainnet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    restart: on-failure
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: base-arb-mev-mainnet-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: on-failure
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: base-arb-mev-mainnet-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: base-arb-mev-mainnet
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  base-market-agent:
    build:
      context: ./base-market-agent
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-base-agent
    depends_on:
      - kafka
    environment:
      - CHAIN_A_WS_URL=${BASE_WS_URL}
      - CHAIN_A_RPC_URL=${BASE_RPC_URL}
      - CHAIN_A_NAME=base
      - AERODROME_ROUTER_ADDR=${AERODROME_ROUTER_ADDR}
      - AERODROME_ETH_USDC_POOL=${AERODROME_ETH_USDC_POOL}
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC=market.base.price-snapshot
      - LOG_LEVEL=info
    restart: on-failure

  arbitrum-market-agent:
    build:
      context: ./arbitrum-market-agent
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-arbitrum-agent
    depends_on:
      - kafka
    environment:
      - CHAIN_B_WS_URL=${ARBITRUM_WS_URL}
      - CHAIN_B_RPC_URL=${ARBITRUM_RPC_URL}
      - CHAIN_B_NAME=arbitrum
      - CAMELOT_ROUTER_ADDR=${CAMELOT_ROUTER_ADDR}
      - CAMELOT_ETH_USDC_POOL=${CAMELOT_ETH_USDC_POOL}
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC=market.arbitrum.price-snapshot
      - LOG_LEVEL=info
    restart: on-failure

  spread-scanner:
    build:
      context: ./spread-scanner
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-spread-scanner
    depends_on:
      - base-market-agent
      - arbitrum-market-agent
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC_CHAIN_A=market.base.price-snapshot
      - INPUT_TOPIC_CHAIN_B=market.arbitrum.price-snapshot
      - OUTPUT_TOPIC=market.spread.signal
      - MIN_SPREAD_BPS=${MIN_SPREAD_BPS:-15}
      - MIN_LIQUIDITY_10BPS_USD=${MIN_LIQUIDITY_10BPS_USD:-750}
      - MIN_CAPACITY_USD=${MIN_CAPACITY_USD:-3000}
      - LOG_LEVEL=info
    restart: on-failure

  opportunity-constructor:
    build:
      context: ./opportunity-constructor
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-opp-constructor
    depends_on:
      - spread-scanner
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=market.spread.signal
      - OUTPUT_TOPIC=risk.opportunity-candidate
      - DEFAULT_SIZE_PERCENT=${DEFAULT_SIZE_PERCENT:-10}
      - MIN_SIZE_USD=${MIN_SIZE_USD:-250}
      - LOG_LEVEL=info
    restart: on-failure

  risk-engine:
    build:
      context: ./risk-engine
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-risk-engine
    depends_on:
      - opportunity-constructor
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=risk.opportunity-candidate
      - OUTPUT_TOPIC=risk.opportunity-evaluation
      - SIMULATIONS=1000
      - EV_MIN_THRESHOLD=${EV_MIN_THRESHOLD:-25}
      - RISK_FIXED_COST_BPS=${RISK_FIXED_COST_BPS:-10}
      - RISK_MIN_EFFECTIVE_SPREAD_BPS=${RISK_MIN_EFFECTIVE_SPREAD_BPS:-15}
      - SHARPE_LIKE_THRESHOLD=${SHARPE_LIKE_THRESHOLD:-0.75}
      - MAX_TAIL_LOSS_PERCENT=${MAX_TAIL_LOSS_PERCENT:-10}
      - LOG_LEVEL=info
    restart: on-failure

  portfolio-manager:
    build:
      context: ./portfolio-manager
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-portfolio
    depends_on:
      - risk-engine
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=risk.opportunity-evaluation
      - OUTPUT_TOPIC=execution.execution-plan
      - MAX_BRIDGE_EXPOSURE_PERCENT=${MAX_BRIDGE_EXPOSURE_PERCENT:-5}
      - MAX_CHAIN_EXPOSURE_PERCENT=${MAX_CHAIN_EXPOSURE_PERCENT:-80}
      - MAX_SINGLE_TRADE_PERCENT=${MAX_SINGLE_TRADE_PERCENT:-10}
      - LOG_LEVEL=info
    restart: on-failure

  arb-bot:
    build:
      context: ./arb-bot
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-arb-bot
    depends_on:
      - portfolio-manager
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPIC=execution.execution-plan
      - OUTPUT_TOPIC=execution.execution-result
      - CHAIN_A_RPC_URL=${BASE_RPC_URL}
      - CHAIN_B_RPC_URL=${ARBITRUM_RPC_URL}
      - CHAIN_A_NAME=base
      - CHAIN_B_NAME=arbitrum
      - PRIVATE_KEY=${WALLET_PRIVATE_KEY}
      - DRY_RUN=${DRY_RUN:-false}
      - MAX_POSITION_USD=100
      - MAX_SLIPPAGE_BPS=${MAX_SLIPPAGE_BPS:-50}
      - LOG_LEVEL=info
    restart: on-failure

  model-feedback-logger:
    build:
      context: ./model-feedback-logger
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-feedback
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPICS=market.base.price-snapshot,market.arbitrum.price-snapshot,market.spread.signal,risk.opportunity-candidate,risk.opportunity-evaluation,execution.execution-plan,execution.execution-result
      - OUTPUT_DIR=/app/logs
      - LOG_LEVEL=info
    volumes:
      - feedback-logs:/app/logs
    restart: on-failure

  alert-rules:
    build:
      context: ./alert-rules
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-alert-rules
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:29092
      - INPUT_TOPICS=market.spread.signal,risk.opportunity-evaluation,execution.execution-result,market.stress-signal
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - MIN_ALERT_SPREAD_BPS=${MIN_ALERT_SPREAD_BPS:-50}
      - MAX_POSITION_ALERT_USD=${MAX_POSITION_ALERT_USD:-5000}
      - ALERT_COOLDOWN_MS=${ALERT_COOLDOWN_MS:-30000}
      - AGENT0_TRADE_MILESTONES=${AGENT0_TRADE_MILESTONES:-50,100}
      - AGENT0_RECURRING_TRADE_MILESTONE_START=${AGENT0_RECURRING_TRADE_MILESTONE_START:-5000}
      - AGENT0_RECURRING_TRADE_MILESTONE_STEP=${AGENT0_RECURRING_TRADE_MILESTONE_STEP:-5000}
      - LOG_LEVEL=info
    restart: on-failure

  stress-monitor:
    build:
      context: ./stress-monitor
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-stress
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:29092
      - OUTPUT_TOPIC=market.stress-signal
      - CHAIN_A_WS_URL=${BASE_WS_URL}
      - LOG_LEVEL=info
    restart: on-failure

  dashboard:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: base-arb-mev-mainnet-dashboard
    ports:
      - "8501:8501"
    environment:
      - KAFKA_BROKERS=kafka:29092
      - LOGS_DIR=/app/logs
    volumes:
      - feedback-logs:/app/logs
    depends_on:
      - kafka
      - model-feedback-logger
    restart: on-failure

volumes:
  zookeeper-data:
  feedback-logs:

networks:
  default:
    name: base-arb-mev-mainnet
