# Demo Package - Evaluation Infrastructure
# ⚠️ This is a stripped demonstration package with mock data only
# No real trading execution, no strategy logic

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Demo market agent for Chain A - publishes mock prices
  demo-market-agent-a:
    build:
      context: ./demo-market-agent
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - KAFKA_TOPIC=market.demo-a.snapshot
      - MARKET_NAME=CHAIN_A
      - MOCK_PRICE=${DEMO_PRICE_A:-2500.00}
      - PUBLISH_INTERVAL_MS=${PUBLISH_INTERVAL:-5000}
      - LOG_LEVEL=info

  # Demo market agent for Chain B - publishes mock prices
  demo-market-agent-b:
    build:
      context: ./demo-market-agent
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - KAFKA_TOPIC=market.demo-b.snapshot
      - MARKET_NAME=CHAIN_B
      - MOCK_PRICE=${DEMO_PRICE_B:-2500.50}
      - PUBLISH_INTERVAL_MS=${PUBLISH_INTERVAL:-5000}
      - LOG_LEVEL=info

  # Demo spread scanner - calculates spread between markets
  demo-scanner:
    build:
      context: ./demo-scanner
      dockerfile: Dockerfile
    depends_on:
      - demo-market-agent-a
      - demo-market-agent-b
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - INPUT_TOPIC_A=market.demo-a.snapshot
      - INPUT_TOPIC_B=market.demo-b.snapshot
      - OUTPUT_TOPIC=market.demo.spread
      - SPREAD_THRESHOLD_BPS=${DEMO_SPREAD_THRESHOLD_BPS:-1}
      - LOG_LEVEL=info

volumes:
  zookeeper-data:
