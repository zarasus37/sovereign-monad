# Monitored Docker Compose Template
# Full infrastructure with monitoring

version: '3.8'

services:
  # Application Services
  market-agent-a:
    build: ./market-agent
    env_file: .env
    networks: [mev-net]

  market-agent-b:
    build: ./market-agent
    env_file: .env
    networks: [mev-net]

  spread-scanner:
    build: ./spread-scanner
    env_file: .env
    depends_on: [market-agent-a, market-agent-b]
    networks: [mev-net]

  arb-bot:
    build: ./arb-bot
    env_file: .env
    depends_on: [spread-scanner]
    networks: [mev-net]

  # Infrastructure
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    networks: [mev-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports: ["2181:2181"]
    networks: [mev-net]

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [mev-net]

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks: [mev-net]

networks:
  mev-net:
    driver: bridge
